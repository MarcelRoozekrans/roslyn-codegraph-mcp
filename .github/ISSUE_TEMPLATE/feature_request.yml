name: Feature Request
description: Suggest a new MCP tool or enhancement
labels: [enhancement]

body:
  - type: dropdown
    id: type
    attributes:
      label: Request type
      options:
        - New MCP tool
        - Enhancement to existing tool
        - Performance improvement
        - Developer experience
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the feature or improvement you'd like
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: How would this be used? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there existing tools or workarounds?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, examples, or references
